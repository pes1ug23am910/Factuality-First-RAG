# ──────────────────────────────────────────────────────────────
# Baseline B4 — Score-Only (always retrieve, passage scoring filters)
# ──────────────────────────────────────────────────────────────

seed: 42

models:
  dense_embedder: "sentence-transformers/all-mpnet-base-v2"
  nli_verifier: "ynie/roberta-large-snli_mnli_fever_anli_R1_R2_R3-nli"
  generator: "mistralai/Mistral-7B-Instruct-v0.3"

data:
  datasets:
    - name: "natural_questions"
      split: "validation"
  dev_sample_size: 500

# Gating disabled — always retrieve
gating:
  enabled: false

index:
  faiss_out: "indexes/wiki100k.faiss"
  pyserini_out: "indexes/wiki100k_lucene"

retriever:
  alpha: 0.6
  normalize: true
  top_k: 10
  rerank: true

# Scorer enabled — filter passages by factuality score
scorer:
  overlap_metric: "token"
  weights:
    w_nli: 0.5
    w_overlap: 0.2
    w_ret: 0.3
  score_threshold: 0.4

pipeline:
  mock_mode: false
  runs_dir: "runs"

eval:
  metrics:
    - exact_match
    - f1
    - factscore
